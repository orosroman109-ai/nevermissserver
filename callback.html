<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Neverpost Ctrl+C</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #121218; color: #e8e8ee; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1e1e2a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 420px; width: 100%; }
        .spinner { width: 40px; height: 40px; border: 4px solid #2a2a3a; border-top-color: #5865f2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.2rem; margin-bottom: 12px; }
        p { font-size: 0.9rem; color: #9a9ab0; line-height: 1.6; }
        .error { color: #ed4245; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #5865f2; color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Signing in...</h2>
        <p id="message">Verifying your Discord account</p>
    </div>

    <script>
    (function() {
        var WORKER_URL = 'https://discord-oauth.YOUR_SUBDOMAIN.workers.dev';
        var title = document.getElementById('title');
        var message = document.getElementById('message');
        var spinner = document.getElementById('spinner');

        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var error = params.get('error');

        if (error) {
            spinner.style.display = 'none';
            title.textContent = 'Login failed';
            title.classList.add('error');
            message.textContent = params.get('error_description') || 'You denied access or something went wrong.';
            return;
        }

        if (!code) {
            spinner.style.display = 'none';
            title.textContent = 'No code';
            title.classList.add('error');
            message.textContent = 'Missing authorization code.';
            return;
        }

        fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                throw new Error(data.error);
            }

            var user = {
                id: data.id,
                username: data.username,
                global_name: data.global_name,
                avatar: data.avatar,
                discriminator: data.discriminator
            };

            localStorage.setItem('np_user', JSON.stringify(user));

            title.textContent = 'Welcome, ' + data.global_name + '!';
            message.textContent = 'Redirecting...';
            spinner.style.display = 'none';

            setTimeout(function() {
                window.location.href = 'https://orosroman109-ai.github.io/nevermissserver/';
            }, 1000);
        })
        .catch(function(err) {
            spinner.style.display = 'none';
            title.textContent = 'Error';
            title.classList.add('error');
            message.textContent = err.message || 'Something went wrong. Try again.';
        });
    })();
    </script>
</body>
</html>
