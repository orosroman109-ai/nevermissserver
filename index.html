<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neverpost Ctrl+C - Discord Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .widget-container {
            background: #2f3136;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .widget-header {
            background: #202225;
            padding: 20px;
            text-align: center;
        }

        .widget-header h1 {
            color: #ffffff;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #3ba55d;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .online-badge::before {
            content: '';
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .widget-body {
            padding: 16px;
        }

        .member-list {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #202225 #2f3136;
        }

        .member-list::-webkit-scrollbar {
            width: 8px;
        }

        .member-list::-webkit-scrollbar-track {
            background: #2f3136;
        }

        .member-list::-webkit-scrollbar-thumb {
            background: #202225;
            border-radius: 4px;
        }

        .member-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #292b2f;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .member-card:hover {
            background: #36393f;
            transform: translateX(4px);
        }

        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 3px solid #292b2f;
        }

        .status-online { background: #3ba55d; }
        .status-dnd { background: #ed4245; }
        .status-idle { background: #faa61a; }
        .status-offline { background: #747f8d; }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-game {
            color: #b9bbbe;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .member-game::before {
            content: '🎮';
            font-size: 0.75rem;
        }

        .widget-footer {
            padding: 16px;
            background: #202225;
            display: flex;
            justify-content: center;
        }

        .join-btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .join-btn:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.4);
        }

        .join-btn svg {
            width: 20px;
            height: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b9bbbe;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #202225;
            border-top-color: #5865f2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ed4245;
        }

        .refresh-info {
            text-align: center;
            color: #72767d;
            font-size: 0.75rem;
            padding: 8px;
        }

        .games-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #202225;
        }

        .games-title {
            color: #b9bbbe;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .game-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #5865f2;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-header">
            <h1 id="server-name">Загрузка...</h1>
            <div class="online-badge" id="online-count">
                <span>0 онлайн</span>
            </div>
        </div>

        <div class="widget-body">
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка данных...</p>
                </div>
            </div>
        </div>

        <div class="widget-footer">
            <a href="#" class="join-btn" id="join-btn" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
                </svg>
                Вступить в сервер
            </a>
        </div>

        <div class="refresh-info" id="refresh-info">
            Авто-обновление через 30 сек
        </div>
    </div>

    <script>
        const GUILD_ID = '1512530980177711325';
        const CORS_PROXY = 'https://corsproxy.io/?';
        const WIDGET_URL = `https://discord.com/api/guilds/${GUILD_ID}/widget.json`;
        let countdown = 30;

        async function fetchWidget() {
            try {
                const response = await fetch(CORS_PROXY + encodeURIComponent(WIDGET_URL));
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                renderWidget(data);
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <p>Не удалось загрузить данные</p>
                        <p style="font-size: 0.8rem; margin-top: 8px; color: #72767d;">Проверьте настройки виджета в Discord</p>
                    </div>
                `;
            }
        }

        function renderWidget(data) {
            document.getElementById('server-name').textContent = data.name;
            document.getElementById('online-count').innerHTML = `<span>${data.presence_count} онлайн</span>`;
            document.getElementById('join-btn').href = data.instant_invite;

            const content = document.getElementById('content');
            
            if (data.members.length === 0) {
                content.innerHTML = '<div class="loading"><p>Нет данных об участниках</p></div>';
                return;
            }

            // Separate members by status
            const online = data.members.filter(m => m.status === 'online');
            const dnd = data.members.filter(m => m.status === 'dnd');
            const idle = data.members.filter(m => m.status === 'idle');
            const allMembers = [...online, ...dnd, ...idle];

            let html = '<div class="member-list">';
            
            allMembers.forEach(member => {
                const statusClass = `status-${member.status}`;
                const gameHtml = member.game ? `<div class="member-game">${member.game.name}</div>` : '';
                
                html += `
                    <div class="member-card">
                        <div class="avatar-container">
                            <img class="avatar" src="${member.avatar_url}" alt="${member.username}">
                            <div class="status-indicator ${statusClass}"></div>
                        </div>
                        <div class="member-info">
                            <div class="member-name">${member.username}</div>
                            ${gameHtml}
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            // Games section
            const playing = data.members.filter(m => m.game);
            if (playing.length > 0) {
                const games = [...new Set(playing.map(m => m.game.name))];
                html += `
                    <div class="games-section">
                        <div class="games-title">🎮 Сейчас играют:</div>
                        <div>
                            ${games.map(game => `<span class="game-tag">${game}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        function updateCountdown() {
            countdown--;
            if (countdown <= 0) {
                countdown = 30;
                fetchWidget();
            }
            document.getElementById('refresh-info').textContent = `Авто-обновление через ${countdown} сек`;
        }

        // Initial load
        fetchWidget();

        // Auto refresh
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
